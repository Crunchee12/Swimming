<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Image Gallery</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
    <h1>📸 Event Image Gallery</h1>
    <p>Upload and preview HD images</p>
  </header>

  <main>
    <section class="upload-section">
      <label for="upload" class="upload-label">Upload Images</label>
      <input type="file" id="upload" multiple accept="image/*">
    </section>

    <section id="gallery" class="gallery"></section>
  </main>

  <!-- Modal for preview -->
  <div id="modal" class="modal">
    <span id="closeBtn">&times;</span>
    <img id="modalImg" src="" alt="Preview">
    <button id="downloadBtn">Download HD</button>
  </div>

  <footer>
    <p>Made with ❤️ for professional submission</p>
  </footer>

  <script src="event.js"></script>
</body>
</html>
